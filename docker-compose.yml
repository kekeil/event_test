services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: event-api
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-Y2hhbmdlLW1lLWluLXByb2QtdGhpcy1pcy1hLXNlY3JldC1iYXNlNjQta2V5LTMyLWJ5dGVz}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@event.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_FROM: ${MAIL_FROM:-no-reply@event.local}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v3/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: event-web
    ports:
      - "3000:3000"
    environment:
      # Côté navigateur (axios depuis le browser) → l'hôte expose 8080
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      # Côté serveur Next (Server Components, route handlers) → réseau interne Docker
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8080}
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped