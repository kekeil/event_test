spring.application.name=event-api
server.port=${SERVER_PORT:8080}

# H2 in-memory
spring.datasource.url=jdbc:h2:mem:eventdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.security.jwt.secret=${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2QtdGhpcy1pcy1hLXNlY3JldC1iYXNlNjQta2V5LTMyLWJ5dGVz}
app.security.jwt.expiration-ms=86400000

# Admin par défaut
app.admin.default-email=${ADMIN_EMAIL:admin@event.local}
app.admin.default-password=${ADMIN_PASSWORD:Admin123!}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Mail (désactivé par défaut, activable via env)
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@event.local}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
